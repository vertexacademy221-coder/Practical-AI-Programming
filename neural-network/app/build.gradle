plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.vertexacademy.neuralnetwork.Neuron'
}


tasks.named('test') {

    // Declenche l'affichage pour les tests reussis, echoues ou ignores
    testLogging {

        events "failed", "skipped"

        // Force l'affichage des messages et des exception
        showExceptions true
        showCauses true
        showStackTraces true

        // Optionnel : affiche le détail ligne par ligne de l'erreur
        exceptionFormat "full"
    }
}
